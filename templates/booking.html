<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-1N1EF0N2QY4"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-1N1EF0N2QY');

    <!-- نوع الترميز -->
    <meta charset="UTF-8">
    <!-- عنوان الصفحة -->
    <title>Booking | Solvane</title>
    <!-- ربط CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- شريط التنقل -->
<nav>
    <div class="nav-container">
        <!-- اللوقو -->
        <a href="{{ url_for('home') }}" class="logo">
            <img src="{{ url_for('static', filename='logo.jpeg') }}" alt="Logo">
            <span>Solvane</span>
        </a>
        <!-- روابط الصفحات -->
        <div class="nav-links">
            <a href="{{ url_for('home') }}">Home</a>
            <a href="{{ url_for('trips') }}">Trips</a>
            <a href="{{ url_for('trip_details') }}">Trip Details</a>
            <a href="{{ url_for('booking') }}">Booking</a>
            <a href="{{ url_for('contact') }}">Contact</a>
        </div>
        <!-- زر الدخول -->
        <div class="nav-auth">
            <a href="{{ url_for('login') }}" class="btn-nav">Login</a>
        </div>
    </div>
</nav>

<!-- صفحة الحجز -->
<section class="section">
    <div class="form-page">
        <h2>Trip Booking</h2>
        <!-- الفورم يرسل البيانات لقاعدة البيانات -->
        <form id="bookingForm" method="POST" action="{{ url_for('booking') }}" novalidate>
            <!-- الاسم -->
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" name="name" required>
            </div>
            <!-- الإيميل -->
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <!-- الجوال -->
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" id="phone" name="phone" required>
            </div>
            <!-- عدد المسافرين -->
            <div class="form-group">
                <label>Number of Travelers</label>
                <input type="number" id="travelers" name="travelers" required>
            </div>
            <!-- التاريخ -->
            <div class="form-group">
                <label>Travel Date</label>
                <input type="date" id="date" name="date" required>
            </div>
            <!-- زر الحجز -->
            <button type="submit" class="btn-main">Confirm Booking</button>
        </form>

        <!-- رسالة نجاح الحجز من السيرفر -->
        {% if success %}
        <p style="color:green; margin-top:10px;">{{ success }}</p>
        {% endif %}

        <!-- رسالة التحقق من JS -->
        <p id="message"></p>
    </div>
</section>

<!-- الفوتر -->
<footer>
    <p>©️ 2025 Solvane. All rights reserved.</p>
</footer>

<!-- JavaScript للتحقق من الحقول داخل الصفحة مباشرة -->
<script>
    // التأكد من وجود نموذج الحجز قبل تشغيل الكود
    const bookingForm = document.getElementById("bookingForm");

    // إذا كان النموذج موجود في الصفحة
    if (bookingForm) {
        bookingForm.addEventListener("submit", function(event) {
            // أخذ القيم من الحقول
            let name = document.getElementById("name").value;
            let email = document.getElementById("email").value;
            let phone = document.getElementById("phone").value;
            let travelers = document.getElementById("travelers").value;
            let date = document.getElementById("date").value;

            // التحقق من تعبئة جميع الحقول
            if (name === "" || email === "" || phone === "" || travelers === "" || date === "" ) {
                event.preventDefault();
                document.getElementById("message").style.color = "red";
                document.getElementById("message").innerText = "Please fill all fields.";
            }
        });
    }
</script>

</body>
</html>
